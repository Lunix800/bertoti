<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="760" viewBox="0 0 1100 760">
  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #1f2937; }
    .subtitle { font: 16px Arial, sans-serif; fill: #4b5563; }
    .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .head { fill: #e5e7eb; stroke: #1f2937; stroke-width: 2; rx: 8; }
    .label { font: bold 17px Arial, sans-serif; fill: #111827; }
    .text { font: 15px Arial, sans-serif; fill: #374151; }
    .small { font: 13px Arial, sans-serif; fill: #4b5563; }
    .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #374151; stroke-width: 2; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
  </defs>

  <rect width="1100" height="760" fill="#f9fafb"/>

  <text x="50" y="50" class="title">Padroes de Projeto - Diagrama Geral</text>
  <text x="50" y="78" class="subtitle">Tema: organizador simples de tarefas do dia a dia</text>

  <rect x="50" y="120" width="300" height="230" class="box"/>
  <rect x="50" y="120" width="300" height="46" class="head"/>
  <text x="70" y="150" class="label">Strategy</text>
  <rect x="75" y="190" width="110" height="44" class="box"/>
  <text x="93" y="217" class="text">Organizador</text>
  <rect x="220" y="180" width="105" height="40" class="box"/>
  <text x="244" y="205" class="small">PorPrazo</text>
  <rect x="220" y="240" width="105" height="40" class="box"/>
  <text x="232" y="265" class="small">PorPrioridade</text>
  <path d="M185 212 C200 212, 205 200, 220 200" class="arrow"/>
  <path d="M185 212 C200 212, 205 260, 220 260" class="arrow"/>
  <text x="75" y="315" class="small">Troca a forma de ordenar tarefas</text>

  <rect x="400" y="120" width="300" height="230" class="box"/>
  <rect x="400" y="120" width="300" height="46" class="head"/>
  <text x="420" y="150" class="label">Observer</text>
  <rect x="430" y="205" width="90" height="44" class="box"/>
  <text x="454" y="232" class="text">Tarefa</text>
  <rect x="575" y="175" width="90" height="34" class="box"/>
  <text x="603" y="197" class="small">Email</text>
  <rect x="575" y="225" width="90" height="34" class="box"/>
  <text x="600" y="247" class="small">Painel</text>
  <rect x="575" y="275" width="90" height="34" class="box"/>
  <text x="592" y="297" class="small">Historico</text>
  <path d="M520 227 C545 227, 550 192, 575 192" class="arrow"/>
  <path d="M520 227 C545 227, 550 242, 575 242" class="arrow"/>
  <path d="M520 227 C545 227, 550 292, 575 292" class="arrow"/>
  <text x="425" y="315" class="small">Avisa interessados quando a tarefa muda</text>

  <rect x="750" y="120" width="300" height="230" class="box"/>
  <rect x="750" y="120" width="300" height="46" class="head"/>
  <text x="770" y="150" class="label">Composite</text>
  <rect x="875" y="185" width="70" height="38" class="box"/>
  <text x="895" y="209" class="small">Item</text>
  <rect x="800" y="260" width="90" height="38" class="box"/>
  <text x="821" y="284" class="small">Tarefa</text>
  <rect x="930" y="260" width="90" height="38" class="box"/>
  <text x="950" y="284" class="small">Projeto</text>
  <path d="M905 223 L855 260" class="dash"/>
  <path d="M925 223 L965 260" class="dash"/>
  <path d="M975 260 C1025 210, 1025 320, 975 298" class="arrow"/>
  <text x="775" y="315" class="small">Projeto pode conter tarefas e projetos</text>

  <rect x="210" y="430" width="680" height="230" class="box"/>
  <rect x="210" y="430" width="680" height="46" class="head"/>
  <text x="230" y="460" class="label">MVC usando os padroes</text>
  <rect x="260" y="525" width="130" height="48" class="box"/>
  <text x="290" y="555" class="text">Controller</text>
  <rect x="485" y="525" width="130" height="48" class="box"/>
  <text x="530" y="555" class="text">Model</text>
  <rect x="710" y="525" width="130" height="48" class="box"/>
  <text x="753" y="555" class="text">View</text>
  <path d="M390 549 L485 549" class="arrow"/>
  <path d="M615 549 L710 549" class="arrow"/>
  <path d="M710 575 C620 640, 480 640, 390 575" class="arrow"/>
  <text x="450" y="610" class="small">Model guarda itens, ordena com Strategy e avisa View com Observer.</text>
  <text x="450" y="632" class="small">Os itens da agenda usam Composite: tarefa simples ou projeto com subtarefas.</text>
</svg>
